name: 🎉 Release

on:
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag"
                required: true
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"

env:
    CARGO_TERM_COLOR: always

jobs:
    release_windows:
        name: 🏗️ Build for Windows x86_64
        runs-on: windows-latest
        steps:
            # Version 7 
            - uses: actions/checkout@v7.0.0
              name: 📂 Checkout
              with:
                # Need png for icon in exe
                lfs: true
                fetch-depth: 1

            - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
              name: ⚙️ Setup Rust
              with:
                  target: x86_64-pc-windows-msvc
                  cache-all-crates: true
                  cache-workspace-crates: true

            - name: 💾 Cache vcpkg folder
              id: cache-target-folder
              uses: actions/cache@v6.1.0
              with:
                path: |
                  target/vcpkg
                  target/x86_64-pc-windows-msvc/release/build
                  target/x86_64-pc-windows-msvc/release/deps
                  target/x86_64-pc-windows-msvc/release/incremental
                key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/Cargo.toml') }}

            - name: ⚙️ Install cargo-vcpkg 
              run: |
                cargo install cargo-vcpkg
                cd runtime && cargo vcpkg build

            - name: 🏗️ Build runtime (windows)
              run: cargo build -p runtime --target=x86_64-pc-windows-msvc --release

            - name: 🏗️ Build editor (windows)
              run: cargo build -p editor --target=x86_64-pc-windows-msvc --release

            - name: 🏗️ Build cli (windows)
              run: cargo build -p vectarine-cli --target=x86_64-pc-windows-msvc --release
            
            - name: 📦 Store windows executables
              uses: actions/upload-artifact@v7.0.1
              with:
                name: vecta-windows
                retention-days: 1
                path: |
                  target/x86_64-pc-windows-msvc/release/vecta.exe
                  target/x86_64-pc-windows-msvc/release/runtime.exe
                  target/x86_64-pc-windows-msvc/release/vectarine-cli.exe

    release_linux:
        name: 🏗️ Build for Linux x86_64
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v7.0.0
            name: 📂 Checkout
            with:
              lfs: true

          - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
            name: ⚙️ Setup Rust
            with:
                target: x86_64-unknown-linux-gnu
                cache-all-crates: true
                cache-workspace-crates: true

          - name: ⚙️ Install dependencies
            run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libmp3lame-dev libjack-dev libpipewire-0.3-dev

          - name: 🏗️ Build runtime (linux)
            run: cargo build -p runtime --target=x86_64-unknown-linux-gnu --release

          - name: 🏗️ Build editor (linux)
            run: cargo build -p editor --target=x86_64-unknown-linux-gnu --release

          - name: 🏗️ Build cli (linux)
            run: cargo build -p vectarine-cli --target=x86_64-unknown-linux-gnu --release

          - name: 📦 Store linux executables
            uses: actions/upload-artifact@v7.0.1
            with:
              name: vecta-linux
              retention-days: 1
              path: |
                target/x86_64-unknown-linux-gnu/release/vecta
                target/x86_64-unknown-linux-gnu/release/runtime
                target/x86_64-unknown-linux-gnu/release/vectarine-cli

    release_web:
        name: 🏗️ Build for Emscripten
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7.0.0
              name: 📂 Checkout
              with:
                # need png for manual
                lfs: true

            - name: ⚙️ Install Mise and mise.toml dependencies
              uses: jdx/mise-action@v4.2.1
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  cache: true
                  version: 2026.3.10
            
            - uses: mymindstorm/setup-emsdk@v16
              name: 🔋 Set up Emscripten
              with:
                  actions-cache-folder: 'emsdk-cache'
                  version: '5.0.3'

            - name: 🐳 Set up Docker
              uses: docker/setup-docker-action@v5.3.0

            - name: 💾 Cache target folder
              id: cache-target-folder
              uses: actions/cache@v6.1.0
              with:
                path: |
                  target/wasm32-unknown-emscripten/release-emscripten/build
                  target/wasm32-unknown-emscripten/release-emscripten/deps
                  target/wasm32-unknown-emscripten/release-emscripten/incremental
                key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/Cargo.toml') }}

            - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
              name: ⚙️ Setup Rust
              with:
                  target: wasm32-unknown-emscripten
                  cache-all-crates: true
                  cache-workspace-crates: true

            - name: 🏗️ Build runtime (web)
              run: cargo build -p runtime --target=wasm32-unknown-emscripten --profile release-emscripten

            - name: 📖 Make PDF
              run: mise run pdfify-manual

            - name: 📦 Store web and PDF
              uses: actions/upload-artifact@v7.0.1
              with:
                name: vecta-web-and-manual
                retention-days: 1
                path: |
                  target/wasm32-unknown-emscripten/release-emscripten/runtime.js
                  target/wasm32-unknown-emscripten/release-emscripten/runtime.wasm
                  docs/user-manual.pdf
    release_macos:
        name: 🏗️ Build for macOS aarch64
        runs-on: macos-latest
        steps:
          - uses: actions/checkout@v7.0.0
            name: 📂 Checkout
            with:
              lfs: true

          - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
            name: ⚙️ Setup Rust
            with:
                target: aarch64-apple-darwin
                cache-all-crates: true
                cache-workspace-crates: true

          - name: 💾 Cache vcpkg folder
            id: cache-target-folder
            uses: actions/cache@v6.1.0
            with:
              path: |
                target/vcpkg
                target/aarch64-apple-darwin/release/build
                target/aarch64-apple-darwin/release/deps
                target/aarch64-apple-darwin/release/incremental
              key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/Cargo.toml') }}

          - name: ⚙️ Install cargo-vcpkg 
            run: |
              cargo install cargo-vcpkg
              cd runtime && cargo vcpkg build

          - name: 🏗️ Build runtime (macos)
            run: cargo build -p runtime --target=aarch64-apple-darwin --release

          - name: 🏗️ Build editor (macos)
            run: cargo build -p editor --target=aarch64-apple-darwin --release

          - name: 🏗️ Build cli (macos)
            run: cargo build -p vectarine-cli --target=aarch64-apple-darwin --release

          - name: 📦 Store macos executables
            uses: actions/upload-artifact@v7.0.1
            with:
              name: vecta-macos
              retention-days: 1
              path: |
                target/aarch64-apple-darwin/release/vecta
                target/aarch64-apple-darwin/release/runtime
                target/aarch64-apple-darwin/release/vectarine-cli

    bundle:
      name: 📦 Bundle and release
      needs: [release_linux, release_windows, release_web, release_macos]
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
      - uses: actions/checkout@v7.0.0
        name: 📂 Checkout
        with:
          # Need to bundle the gallery which has LFS files
          lfs: true

      - name: ⚙️ Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: ⬇️ Download Linux artefacts
        uses: actions/download-artifact@v8.0.0
        with:
          path: ./linux
          pattern: vecta-linux
        continue-on-error: true

      - name: ⬇️ Download Windows artefacts
        uses: actions/download-artifact@v8.0.0
        with:
          path: ./windows
          pattern: vecta-windows
        continue-on-error: true

      - name: ⬇️ Download Web artefacts
        uses: actions/download-artifact@v8.0.0
        with:
          path: ./web
          pattern: vecta-web-and-manual
        continue-on-error: true

      - name: ⬇️ Download macOS artefacts
        uses: actions/download-artifact@v8.0.0
        with:
          path: ./macos
          pattern: vecta-macos
        continue-on-error: true

      - name: 🚚 Move the artefacts
        # For some reason, the web artefacts are inside /target/wasm32-unknown-emscripten/release-emscripten but not the others.
        run: |
          mkdir -p ./target/x86_64-unknown-linux-gnu/release
          mkdir -p ./target/x86_64-pc-windows-msvc/release
          mkdir -p ./target/aarch64-apple-darwin/release
          mkdir -p ./target/wasm32-unknown-emscripten/release-emscripten
          mkdir -p ./docs
          ls -R ./linux
          ls -R ./windows
          ls -R ./macos
          ls -R ./web
          mv -f ./linux/* ./target/x86_64-unknown-linux-gnu/release/
          mv -f ./windows/* ./target/x86_64-pc-windows-msvc/release/
          mv -f ./macos/* ./target/aarch64-apple-darwin/release/
          mv -f ./web/docs/* ./docs/
          mv -f ./web/target/wasm32-unknown-emscripten/release-emscripten/* ./target/wasm32-unknown-emscripten/release-emscripten/
          mv -f ./target/x86_64-unknown-linux-gnu/release/vectarine-cli ./target/x86_64-unknown-linux-gnu/release/vecta-ci
        continue-on-error: true

      - name: 📦 Generate release files
        run: uv run scripts/release-engine.py

      - name: ✨ Create a GitHub Release
        uses: softprops/action-gh-release@v3.0.2
        # This can fail if the release already exists. Let's ignore that.
        continue-on-error: true
        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
            # ref_name is the tag.
            # We just put the version number as the title, no need to add vectarine, it looks weird 
            name: "${{ inputs.tag || github.ref_name }}"
            tag_name: "${{ inputs.tag || github.ref_name }}"
            generate_release_notes: false
            draft: true
            body: |
              ## New features

              ## Fixes

              ## Miscellaneous
            files: |
              vectarine.*.zip
              ./target/x86_64-unknown-linux-gnu/release/vecta-ci
