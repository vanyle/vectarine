<!doctype html>
<html lang="en-us">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<title>Vectarine</title>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				width: 100vw;
				height: 100vh;
				overflow: hidden;
			}

			.loading-info {
				z-index: 1;
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
			}

			/* the canvas *must not* have any border or padding, or mouse coords will be wrong */
			canvas {
				border: 0px none;
				position: absolute;
				top: 0;
				left: 0;
				width: 100vw;
				height: 100vh;
				background-color: black;
			}

			#status {
				color: white;
				font-family: Arial, sans-serif;
				font-size: 24px;
				text-shadow: 1px 1px 3px 2px #eee;
			}

			.loading-info {
				display: flex;
				flex-direction: column;
				row-gap: 16px;
				align-items: center;
			}

			.progress-container {
				width: 300px;
				height: 44px;
				padding: 4px;
				background-color: black;
				border: 4px solid white;
				overflow: hidden;
			}

			.progress-bar {
				width: 100%;
				height: 100%;
				
				background-image: repeating-linear-gradient(
					to right,
					white 0px,
					white 100px,
					transparent 100px,
					transparent 300px 
				);
				
				background-size: 300px 100%;
				
				animation: slideRight 1s linear infinite;
			}

		@keyframes slideRight {
			from {
				background-position: 0% 0px;
			}
			to {
				background-position: 300px 0px; 
			}
		}
		</style>
	</head>

			<div class="progress-container">
				<div class="progress-bar"></div>
			</div>
			<div id="status">Loading Vectarine ...</div>
		</div>

		<canvas
			id="canvas"
			oncontextmenu="event.preventDefault()"
		></canvas>
		<script>
			const debugMode = location.hash === "#debug";

			if(debugMode) {
				console.log("Debug mode enabled");
			}

			function read_file_for_rust(callback_id, filename) {
				(async () => {
					try {
						const response = await fetch(filename);
						if (response.status >= 400) {
							Module.setStatus("File not found: " + filename);
							Module.ccall(
								"read_rust_callback_from_js",
								null,
								["number", "number", "number"],
								[callback_id, 0, 0],
							);
							return;
						}
						const fileData = await response.bytes();
						// Allocate memory in WASM and copy the file data there.
						const bufferPtr = window.Module.ccall(
							"alloc_rust_buffer",
							"number",
							["number"],
							[fileData.length],
						);
						window.Module.HEAPU8.set(fileData, bufferPtr);

						// Ownership of the memory is transferred to Rust. Note that we are not able to free it from JS because the free function is not exposed (which is good)
						try {
							if(debugMode){
								console.log("read_rust_callback_from_js: ", callback_id, bufferPtr, fileData.length);
							}
							Module.ccall(
								"read_rust_callback_from_js",
								null,
								["number", "number", "number"],
								[callback_id, bufferPtr, fileData.length],
							);
						} catch (err) {
							// Rust crash. Do not call read_rust_callback_from_js again in this case.
							console.error("The Rust code crashed.");
							loadingInfoElement.style.display = "";
							loadingInfoElement.textContent =
								"The game crashed. Open the browser console for more info.";

							console.error(err);
						}
					} catch (err) {
						console.error("Error fetching file:");
						console.log(err);
						Module.ccall(
							"read_rust_callback_from_js",
							null,
							["number", "number"],
							[callback_id, 0, 0],
						);
					}
				})();
			}

			function sleep_for_rust(o) {
				const callback = o.callback;
				const sleeptime = o.sleep;
				setTimeout(() => {
					callback();
				}, sleeptime);
			}

			let rust_status = "LOADING";

			function ready_is_rust() {
				rust_status = "READY";
			}

			function exited_did_rust() {
				rust_status = "EXITED";
			}

			const canvas = document.getElementById("canvas");
			window.vectarine = {
				read_file_for_rust: read_file_for_rust,
				sleep_for_rust: sleep_for_rust,
				ready_is_rust: ready_is_rust,
				exited_did_rust: exited_did_rust,
				getScreenSize: function () {
					return {
						width: canvas.clientWidth,
						height: canvas.clientHeight,
					};
				},
				getDrawableScreenSize: function () {
					return {
						width: canvas.width,
						height: canvas.height,
					};
				},
			};

			const loadingInfoElement = document.getElementById("loading-info");
			const statusText = document.getElementById("status");
			var Module = {
				preRun: [],
				postRun: [],
				print: (function () {
					return function (text) {
						if (arguments.length > 1)
							text = Array.prototype.slice
								.call(arguments)
								.join(" ");
						// These replacements are necessary if you render to raw HTML
						console.log("[WASM]", ...arguments);
					};
				})(),
				printErr: function (text) {
					if (arguments.length > 1)
						text = Array.prototype.slice.call(arguments).join(" ");
					if (0) {
						// XXX disabled for safety typeof dump == 'function') {
						dump(text + "\n"); // fast, straight to the real console
					} else {
						console.error(text);
						if (text.startsWith("fatal runtime error")) {
							// Stop the module on fatal errors
							// This avoid spamming the console with unrelevant errors
							Module.abort();
						}
					}
				},
				canvas: (function () {
					var canvas = document.getElementById("canvas");
					// As a default initial behavior, pop up an alert when webgl context is lost. To make your
					// application robust, you may want to override this behavior before shipping!
					// See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
					canvas.addEventListener(
						"webglcontextlost",
						function (e) {
							alert(
								"WebGL context lost. You will need to reload the page.",
							);
							e.preventDefault();
						},
						false,
					);
					return canvas;
				})(),
				setStatus: function (text) {
					if(debugMode){
						console.log("[status]", text);
					}
					if (!Module.setStatus.last)
						Module.setStatus.last = { time: Date.now(), text: "" };
					if (text === Module.setStatus.text) return;
					var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
					var now = Date.now();
					if (m && now - Date.now() < 30) return; // if this is a progress update, skip it if too soon
					if (text.trim() === "Running...") {
						loadingInfoElement.style.display = "none";
					}
					statusText.textContent = text;
				},
				totalDependencies: 0,
				monitorRunDependencies: function (left) {
					this.totalDependencies = Math.max(
						this.totalDependencies,
						left,
					);
					Module.setStatus(
						left
							? "Preparing... (" +
									(this.totalDependencies - left) +
									"/" +
									this.totalDependencies +
									")"
							: "All downloads complete.",
					);
				},
			};
			window.Module = Module; // Set it as global for access in our helpers.

			Module.setStatus("Downloading Vectarine Game...");
			window.onerror = function (event) {
				statusText.style.display = "";
				Module.setStatus("Error occured during initialization, open the browser console for more info.");
				loadingInfoElement.style.display = "";
				Module.setStatus = function (text) {
					if (text)
						Module.printErr("[post-exception status] " + text);
				};
			};

			function scriptLoadError() {
				statusText.style.display = "";
				statusText.textContent =
					"Error loading runtime, is the file there?";
			}
			addEventListener("load", () => {
				let script = document.createElement("script");
				script.onerror = scriptLoadError;
				script.src =
					"target/wasm32-unknown-emscripten/release-emscripten/runtime.js";
				document.head.appendChild(script);
			});
		</script>
	</body>
</html>
